<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHub · 团队工具墙</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='100%25' stop-color='%2316a34a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Cpath d='M18 4 L8 18 L14 18 L13 28 L24 13 L17 13 Z' fill='white'/%3E%3C/svg%3E">
  <link rel="alternate icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  <meta name="theme-color" content="#22c55e">
  <meta name="description" content="WebHub 团队工具墙 — 小团队的共享工具桌面、内网链接收纳、AI Agent 速访">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-container">
        <div class="header-left">
          <h1 class="logo">⚡ WebHub</h1>
          <span class="subtitle" id="teamSubtitle">团队工具墙</span>
        </div>
        <div class="header-right">
          <div class="team-stats" id="teamStats" title="团队动态"></div>
          <div class="view-toggle">
            <button class="view-btn active" onclick="setView('grid')" id="gridBtn" title="网格视图 (G)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" onclick="setView('list')" id="listBtn" title="列表视图 (G)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </button>
            <button class="view-btn" onclick="setView('compact')" id="compactBtn" title="紧凑视图 (G)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
            </button>
          </div>
          <div class="search-box">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="搜索 (按 / 聚焦)..." oninput="handleSearch()">
            <kbd class="search-hint">/</kbd>
          </div>
          <button class="btn btn-ghost" onclick="showBatchModal()" title="批量添加">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            批量
          </button>
          <button class="btn btn-primary" onclick="showAddModal()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            新增项目
          </button>
          <button class="user-btn" id="userBtn" onclick="changeUserName()" title="点击设置昵称">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="userBtnLabel">访客</span>
          </button>
        </div>
      </div>
    </header>

    <nav class="stats-bar-wrapper">
      <div class="stats-bar" id="statsBar"></div>
    </nav>

    <div class="layout-container">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">分类</div>
          <div class="category-tabs" id="categoryTabs"></div>
        </div>
        <div class="sidebar-section" id="tagSection" style="display:none">
          <div class="sidebar-title">标签</div>
          <div class="tag-list" id="tagList"></div>
        </div>
        <div class="sidebar-section" id="activitySection">
          <div class="sidebar-title">最近动态</div>
          <div class="activity-feed" id="activityFeed"></div>
        </div>
      </aside>

      <div class="main-wrapper">
        <main class="main-content">
          <section class="hot-section" id="hotSection" style="display:none">
            <div class="section-header">
              <h2 class="section-title">🔥 最近热门</h2>
              <span class="section-hint">基于近 30 天点击</span>
            </div>
            <div class="hot-list" id="hotList"></div>
          </section>

          <section class="favorites-section" id="favoritesSection" style="display:none">
            <div class="section-header">
              <h2 class="section-title">⭐ 我常用</h2>
              <span class="section-hint">基于本机点击记录</span>
            </div>
            <div class="favorites-list" id="favoritesList"></div>
          </section>

          <section class="projects-section">
            <div class="section-header">
              <h2 class="section-title" id="projectsTitle">全部项目</h2>
              <span class="section-hint" id="projectsCount"></span>
            </div>
            <div class="projects-grid" id="projectsGrid"></div>
            <div class="empty-state" id="emptyState" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
              <h3>暂无项目</h3>
              <p>点击「新增项目」添加你的第一个 Web 项目</p>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- 新增/编辑 -->
    <div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)hideAddModal()">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">新增项目</h2>
          <button class="close-btn" onclick="hideAddModal()">✕</button>
        </div>
        <form id="projectForm" onsubmit="handleSubmit(event)">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label for="projName">项目名称 <span class="required">*</span></label>
            <input type="text" id="projName" required placeholder="例如：内部管理系统">
          </div>
          <div class="form-group">
            <label for="projUrl">项目地址 <span class="required">*</span>
              <button type="button" class="mini-btn" onclick="autoFetchMeta()" title="从 URL 自动抓取标题和图标">🔮 自动填充</button>
            </label>
            <input type="url" id="projUrl" required placeholder="https://example.com">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="projUser">用户名</label>
              <input type="text" id="projUser" placeholder="登录用户名" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="projPass">密码</label>
              <div class="password-input-wrapper">
                <input type="password" id="projPass" placeholder="登录密码" autocomplete="new-password">
                <button type="button" class="password-toggle-btn" onclick="toggleEditPassword(this)" title="显示/隐藏密码">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="projCategory">分类</label>
              <input type="text" id="projCategory" placeholder="例如：内部系统" list="categoryList">
              <datalist id="categoryList"></datalist>
            </div>
            <div class="form-group">
              <label for="projTags">标签 <span class="hint-text">(逗号分隔，多个标签)</span></label>
              <input type="text" id="projTags" placeholder="例如：AI, 实验, 内部">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="projTips">小贴士 <span class="hint-text">(踩坑提示、使用须知)</span></label>
              <input type="text" id="projTips" placeholder="例如：需先连 VPN / 使用企业邮箱登录">
            </div>
            <div class="form-group" style="max-width: 180px;">
              <label for="projVersion">版本 <span class="hint-text">(可选)</span></label>
              <input type="text" id="projVersion" placeholder="例如：v1.2.0">
            </div>
          </div>
          <div class="form-group" id="screenshotSection" style="display:none">
            <label>截图预览</label>
            <div class="screenshot-list" id="screenshotList"></div>
          </div>
          <div class="form-group">
            <label>描述</label>
            <div id="projDescEditor" style="height: 150px;"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" onclick="hideAddModal()">取消</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 批量添加 -->
    <div class="modal-overlay" id="batchModal" style="display:none" onclick="if(event.target===this)hideBatchModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>批量添加项目</h2>
          <button class="close-btn" onclick="hideBatchModal()">✕</button>
        </div>
        <div class="modal-body">
          <p class="hint-text" style="margin-bottom: 12px;">每行一个 URL，系统会自动抓取标题、描述和图标。已存在的 URL 会跳过。</p>
          <div class="form-group">
            <label for="batchCategory">分类（统一应用）</label>
            <input type="text" id="batchCategory" placeholder="例如：内部系统" list="categoryList">
          </div>
          <div class="form-group">
            <label for="batchUrls">URL 列表 <span class="required">*</span></label>
            <textarea id="batchUrls" rows="10" placeholder="https://example.com&#10;https://docs.example.com&#10;https://github.com/team/repo"></textarea>
          </div>
          <div id="batchResult" class="batch-result"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="hideBatchModal()">取消</button>
          <button type="button" class="btn btn-primary" id="batchSubmitBtn" onclick="submitBatch()">开始导入</button>
        </div>
      </div>
    </div>

    <!-- 详情 -->
    <div class="modal-overlay" id="detailModal" style="display:none" onclick="if(event.target===this)hideDetailModal()">
      <div class="modal modal-detail">
        <div class="modal-header">
          <h2 id="detailTitle">项目详情</h2>
          <button class="close-btn" onclick="hideDetailModal()">✕</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </div>

    <!-- QR 分享 -->
    <div class="modal-overlay" id="qrModal" style="display:none" onclick="if(event.target===this)hideQrModal()">
      <div class="modal modal-qr">
        <div class="modal-header">
          <h2>📱 扫码访问</h2>
          <button class="close-btn" onclick="hideQrModal()">✕</button>
        </div>
        <div class="qr-body">
          <div id="qrCanvas"></div>
          <div class="qr-info">
            <div class="qr-name" id="qrName"></div>
            <div class="qr-url" id="qrUrl"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 设置昵称 -->
    <div class="modal-overlay" id="userModal" style="display:none" onclick="if(event.target===this)hideUserModal()">
      <div class="modal modal-small">
        <div class="modal-header">
          <h2>👋 设置你的昵称</h2>
          <button class="close-btn" onclick="hideUserModal()">✕</button>
        </div>
        <div class="modal-body">
          <p class="hint-text" style="margin-bottom: 12px;">用于在卡片上标记"谁加的/谁改的"。仅保存在本机，不需要注册账号。</p>
          <input type="text" id="userNameInput" placeholder="例如：林伟 / Lin" maxlength="32" autofocus>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="hideUserModal()">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveUserName()">保存</button>
        </div>
      </div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" style="display:none">
      <img class="lightbox-img" id="lightboxImg" src="" alt="预览大图">
    </div>

    <div class="iframe-overlay" id="iframeOverlay" style="display:none">
      <div class="iframe-header">
        <div class="iframe-info">
          <span class="iframe-name" id="iframeName"></span>
          <span class="iframe-url" id="iframeUrl"></span>
        </div>
        <div class="iframe-actions">
          <button class="btn btn-ghost btn-sm" onclick="capturePageScreenshot()" id="screenCapBtn" title="截图 (最多4张)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            截图
          </button>
          <button class="btn btn-ghost btn-sm" onclick="openInNewTab()" title="新窗口打开">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
            新窗口
          </button>
          <button class="btn btn-ghost btn-sm" onclick="hideIframe()" title="关闭">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            关闭
          </button>
        </div>
      </div>
      <iframe id="projectIframe" referrerpolicy="no-referrer"></iframe>
    </div>

    <div id="dragOverlay" class="drag-overlay">
      <div class="drag-overlay-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span>松开鼠标，立即添加项目</span>
      </div>
    </div>

    <div class="shortcut-help" id="shortcutHelp">
      <div class="shortcut-row"><kbd>/</kbd> 聚焦搜索</div>
      <div class="shortcut-row"><kbd>G</kbd> 切换视图</div>
      <div class="shortcut-row"><kbd>1-9</kbd> 切换分类</div>
      <div class="shortcut-row"><kbd>N</kbd> 新增项目</div>
      <div class="shortcut-row"><kbd>?</kbd> 显示帮助</div>
      <div class="shortcut-row"><kbd>Esc</kbd> 关闭弹窗</div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
