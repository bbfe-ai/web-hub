<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHub - 项目管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-container">
        <div class="header-left">
          <h1 class="logo">⚡ WebHub</h1>
          <span class="subtitle">项目管理中心</span>
        </div>
        <div class="header-right">
          <div class="view-toggle" style="margin-right: 8px;">
            <button class="view-btn active" onclick="setView('grid')" id="gridBtn" title="网格视图">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" onclick="setView('list')" id="listBtn" title="列表视图">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </button>
          </div>
          <div class="search-box">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="搜索项目..." oninput="handleSearch()">
          </div>
          <button class="btn btn-primary" onclick="showAddModal()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            新增项目
          </button>
        </div>
      </div>
    </header>

    <nav class="stats-bar-wrapper">
      <div class="stats-bar" id="statsBar"></div>
    </nav>

    <div class="layout-container">
      <aside class="sidebar">
        <div class="category-tabs" id="categoryTabs"></div>
      </aside>

      <div class="main-wrapper">
        <main class="main-content">
          <div class="projects-grid" id="projectsGrid"></div>
          <div class="empty-state" id="emptyState" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <h3>暂无项目</h3>
            <p>点击「新增项目」添加你的第一个 Web 项目</p>
          </div>
        </main>
      </div>
    </div>

    <div class="modal-overlay" id="addModal" style="display:none" onclick="if(event.target===this)hideAddModal()">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">新增项目</h2>
          <button class="close-btn" onclick="hideAddModal()">✕</button>
        </div>
        <form id="projectForm" onsubmit="handleSubmit(event)">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label for="projName">项目名称 <span class="required">*</span></label>
            <input type="text" id="projName" required placeholder="例如：内部管理系统">
          </div>
          <div class="form-group">
            <label for="projUrl">项目地址 <span class="required">*</span></label>
            <input type="url" id="projUrl" required placeholder="https://example.com">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="projUser">用户名</label>
              <input type="text" id="projUser" placeholder="登录用户名" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="projPass">密码</label>
              <input type="password" id="projPass" placeholder="登录密码" autocomplete="new-password">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="projCategory">分类</label>
              <input type="text" id="projCategory" placeholder="例如：内部系统" list="categoryList">
              <datalist id="categoryList"></datalist>
            </div>
          </div>
          <div class="form-group" id="screenshotSection" style="display:none">
            <label>截图预览</label>
            <div class="screenshot-list" id="screenshotList"></div>
          </div>
          <div class="form-group">
            <label>描述</label>
            <div id="projDescEditor" style="height: 150px;"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-ghost" onclick="hideAddModal()">取消</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-overlay" id="detailModal" style="display:none" onclick="if(event.target===this)hideDetailModal()">
      <div class="modal modal-detail">
        <div class="modal-header">
          <h2 id="detailTitle">项目详情</h2>
          <button class="close-btn" onclick="hideDetailModal()">✕</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay" style="display:none">
      <img class="lightbox-img" id="lightboxImg" src="" alt="预览大图">
    </div>

    <div class="iframe-overlay" id="iframeOverlay" style="display:none">
      <div class="iframe-header">
        <div class="iframe-info">
          <span class="iframe-name" id="iframeName"></span>
          <span class="iframe-url" id="iframeUrl"></span>
        </div>
        <div class="iframe-actions">
          <button class="btn btn-ghost btn-sm" onclick="capturePageScreenshot()" id="screenCapBtn" title="截图 (最多4张)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            截图
          </button>
          <button class="btn btn-ghost btn-sm" onclick="openInNewTab()" title="新窗口打开">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
            新窗口
          </button>
          <button class="btn btn-ghost btn-sm" onclick="hideIframe()" title="关闭">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            关闭
          </button>
        </div>
      </div>
      <iframe id="projectIframe" referrerpolicy="no-referrer"></iframe>
    </div>

    <div id="dragOverlay" class="drag-overlay">
      <div class="drag-overlay-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span>松开鼠标，立即添加项目</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
