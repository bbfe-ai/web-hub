name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting (if configured)
      run: npm run lint || echo "No lint script configured"
      continue-on-error: true
    
    - name: Build Docker image
      run: docker build -t webhub:test .
    
    - name: Test Docker container
      run: |
        docker run -d --name webhub-test -p 3000:3000 webhub:test
        sleep 5
        curl -f http://localhost:3000 || exit 1
        docker stop webhub-test
        docker rm webhub-test

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.repository_owner == 'your-username'
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.repository_owner == 'your-username' }}
        tags: |
          webhub:latest
          webhub:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max